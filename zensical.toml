[project]
site_name = "Jervis Fantasy Football"
site_description = "Documentation for the Jervis Fantasy Football client and engine"
site_url = "https://cmelchior.github.io/jervis-ffb/"
site_author = "Christian Melchior"
repo_url = "https://github.com/cmelchior/jervis-ffb"
repo_name = "cmelchior/jervis-ffb"
docs_dir = "website"
extra_css = ["assets/stylesheets/extra.css"]
nav = [
  { "Home" = [
      { "Home" = "index.md" },
      { "Download page" = "https://cmelchior.github.io/jervis-ffb/download.html" },
      { "Screenshots" = "screenshots.md" }
  ]},
  { "2025 Rules (3rd Season)" = [
    { "2025 Rules" = "bb2025/index.md" },
    { "Base Rules" = "bb2025/bb2025-base-rules.md" },
    { "Skills" = "bb2025/bb2025-skills.md" },
    { "Star Players" = "bb2025/bb2025-starplayers.md" },
  ]},
]

[project.theme]
custom_dir = "website/assets/overrides"
logo = "assets/jervis-logo.svg"
favicon = "assets/jervis-docs-logo.svg"
icon.repo = "fontawesome/brands/github"
language = "en"
features = [
    "content.code.copy",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.indexes",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon.admonition]
naf = "external/naf"
fumbbl = "external/fumbbl"
bloodbowl = "external/bloodbowl"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["website/assets/overrides/.icons"]



