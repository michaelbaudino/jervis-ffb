// Reads app metadata dynamically from Gradle.
// Passing -Pjervis.releaseType=dev ensures the version is proper SemVer (not -SNAPSHOT builds).
// If configuration cache causes issues, add: -Dorg.gradle.configuration-cache=false
include "#!./gradlew -q :modules:jervis-ui:printConveyorConfig -Pjervis.releaseType=dev"

// This enables native library extraction, which improves app startup time and robustness.
// It's optional but a good idea to have it. You can remove this if you get tired of specifying
// system properties for Java libraries with native components.
//
// See https://hydraulic.dev/blog/11-in-jar-signing.html for more.
include required("https://raw.githubusercontent.com/hydraulic-software/conveyor/master/configs/jvm/extract-native-libraries.conf")

// Config file documentation: https://conveyor.hydraulic.dev/latest/configs
app {
  vendor = "Christian Melchior"
  description = "A desktop app for playing Blood Bowl"
  contact-email = "christianmelchior@gmail.com"
  license = "Apache-2.0"
  version = ${env.JERVIS_APP_VERSION}

  // Required for free Conveyor OSS license — must point to the public repo
  // The base URL is where the download site will be placed. Packages will check here for updates.
  // When the version control system URL is pointed at github.com,
  // github releases and pages are used automatically. You just need
  // an API token.
  vcs-url = "https://github.com/cmelchior/jervis-ffb"

  // App icons
  icons = "logo/logo.svg"

  sign = true
  signing-key = ${env.JERVIS_CONVEYOR_SIGNING_KEY}

  // Mac signing certificate (file path, decoded from base64 secret on CI).
  // Optional: Omitted for local macOS builds where Conveyor uses the system keychain.
  mac {
    // Both signing-key and certificate must point to the same .p12 file.
    // Passphrase is provided via --passphrase env:JERVIS_MACOS_BUILD_CERTIFICATE_PASSWORD in extra_flags.
    signing-key = ${?env.JERVIS_MACOS_CERTIFICATE_PATH}
    certificate = ${?env.JERVIS_MACOS_CERTIFICATE_PATH}
    notarization {
        app-specific-password = ${env.JERVIS_MACOS_NOTARIZATION_PASSWORD}
        team-id = ${env.JERVIS_MACOS_NOTARIZATION_TEAM_ID}
        apple-id = ${env.JERVIS_MACOS_NOTARIZATION_APPLE_ID}
      }
  }

  // GitHub Releases as the distribution and update site.
  // Conveyor auto-sets the download base URL from vcs-url when it's a GitHub repo.
  site {
    github {
      oauth-token = ${env.JERVIS_CONVEYOR_GITHUB_TOKEN}
      // Upload the new download page with links to Github Pages
      pages-branch = "gh-pages"
    }
    // Open source projects are required to advertise the fact that they're packaged with Conveyor.
    show-conveyor-badge = true
  }

  // For iteration speed. Remove for release.
  // compression-level = low

  // Check for and apply updates asynchronously in the background
  updates = background
}

conveyor.compatibility-level = 22
