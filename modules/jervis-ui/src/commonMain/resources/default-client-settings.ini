# The following sections follow a certain format in order to auto-generate code
# that can be used to generate the in-game menu. Each section must start with
# a special directive entry: <xx>.<yy>.label=<header>.
# This will generate a top-level menu which will contain all entries with the
# same <xx>.<yy> prefix.
# Only boolean values are supported right now.

# -- GAME_MENU: Automatic Actions --
# Actions that will automatically be selected by the Game Client before the
# Coach is presented with the option
jervis.autoAction.sectionLabel=Auto Actions
jervis.autoAction.sections=actions,skills

# Automated actions that are not directly based on skills
jervis.autoAction.actions.label=Automated Actions

jervis.autoAction.actions.doNotRerollSuccessfulActions.label=Do not reroll successful actions
jervis.autoAction.actions.doNotRerollSuccessfulActions.description=Accept D6 rolls that are a success
jervis.autoAction.actions.doNotRerollSuccessfulActions.value=true

jervis.autoAction.actions.selectKickingPlayer.label=Select kicking player
jervis.autoAction.actions.selectKickingPlayer.description=Will prioritize players with Kick
jervis.autoAction.actions.selectKickingPlayer.value=true

jervis.autoAction.actions.endPlayerActionIfOnlyOption.label=End player action
jervis.autoAction.actions.endPlayerActionIfOnlyOption.description="Ends the player's activation when it is the only option"
jervis.autoAction.actions.endPlayerActionIfOnlyOption.value=true

jervis.autoAction.actions.selectBlockTypeIfOneOption.label=Select Block type
jervis.autoAction.actions.selectBlockTypeIfOneOption.description=Selects the available Block type if there is only one option
jervis.autoAction.actions.selectBlockTypeIfOneOption.value=true

jervis.autoAction.actions.pushPlayerIntoCrowd.label=Push player into the crowd
jervis.autoAction.actions.pushPlayerIntoCrowd.description=Push an opponent into the crowd if possible
jervis.autoAction.actions.pushPlayerIntoCrowd.value=true

# Automated actions for when to automatically apply skills
jervis.autoAction.skills.label=Automated Skill Usage

jervis.autoAction.skills.alwaysUseBigHand.label=Big Hand
jervis.autoAction.skills.alwaysUseBigHand.description=Use to Pickup and Secure the Ball
jervis.autoAction.skills.alwaysUseBigHand.value=true

jervis.autoAction.skills.useCatchSkillReroll.label=Catch
