jervis.autoAction.skills.alwaysUseGrab.label=Grab
jervis.autoAction.skills.alwaysUseGrab.description=Use to control opponent pushback direction
jervis.autoAction.skills.alwaysUseGrab.value=false

jervis.autoAction.skills.alwaysUseLeapModifier.label=Leap (Modifier)
