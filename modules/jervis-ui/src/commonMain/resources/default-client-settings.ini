# -- GAME_MENU: UI Settings
# If enabled will show the dogout behind players, otherwise there will only be the game background
jervis.ui.sectionLabel=UI Settings

jervis.ui.showDogoutBackground.label=Dogout Background
jervis.ui.showDogoutBackground.description=Shows the dugout background image behind players in the dugout area
jervis.ui.showDogoutBackground.value=true

# If enabled, the current pitch weather is used as the entire game background.
# This might also impact the color of the log views.
# If disabled, the "nice" weather effect is used
jervis.ui.usePitchWeatherAsGameBackground.label=Pitch weather as game background
jervis.ui.usePitchWeatherAsGameBackground.description=Uses the current pitch weather conditions as the game background
jervis.ui.usePitchWeatherAsGameBackground.value=false

jervis.ui.showMouseOverEffectOnSquare.label=Highlight current square
jervis.ui.showMouseOverEffectOnSquare.description=Highlight field square when the mouse pointer is over it
jervis.ui.showMouseOverEffectOnSquare.value=true

jervis.ui.hideJumpIfLeapIsAvailable.label=Hide Jump if Leap is available
jervis.ui.hideJumpIfLeapIsAvailable.description=Hide the Jump action when the Leap action is available
jervis.ui.hideJumpIfLeapIsAvailable.value=true